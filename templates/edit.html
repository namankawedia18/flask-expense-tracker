{% extends "base.html" %}

{% block title %}
Edit Expense
{% endblock %}

{% block content %}

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-warning text-dark text-center">

                        <h3>Edit Expense</h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Event
                                </label>

                                <input
                                    type="text"
                                    name="event_name"
                                    class="form-control"
                                    value="{{ expense.event }}"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Amount
                                </label>

                                <input
                                    type="number"
                                    step="0.01"
                                    name="price"
                                    class="form-control"
                                    value="{{ expense.amount }}"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Date
                                </label>

                                <input
                                    type="date"
                                    name="date"
                                    class="form-control"
                                    value="{{ expense.date }}"
                                    required>

                            </div>

                            <div class="d-grid gap-2">

                                <button type="submit" class="btn btn-warning">
                                    Save Changes
                                </button>

                                <a href="{{ url_for('viewExpense') }}"
                                   class="btn btn-secondary">
                                    Cancel
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>
    
{% endblock %}
